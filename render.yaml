services:
  - type: web
    name: tender-system-rokser
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: tender-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: CLAUDE_API_KEY
        sync: false
      - key: TENDERS_PHONE
        sync: false
      - key: TENDERS_PASSWORD
        sync: false

  - type: cron
    name: tender-daily-scan
    runtime: python
    rootDir: backend
    buildCommand: pip install -r ../requirements.txt
    schedule: "0 6 * * *"
    startCommand: python auto_scraper.py
    disk:
      name: tender-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: CLAUDE_API_KEY
        sync: false
      - key: TENDERS_PHONE
        sync: false
      - key: TENDERS_PASSWORD
        sync: false
